                                                onChange={e => setSearchQuery(e.target.value)}
                                                placeholder="Buscar huevo, pollo, manzana..." 
                                                className="w-full premium-input bg-transparent rounded-xl pl-10 pr-4 py-3 text-xs text-white outline-none"
                                            />
                                        </div>

                                        <div className="flex gap-1.5 overflow-x-auto pb-3 shrink-0 hide-scrollbar scroll-smooth">
                                            {categories.map(cat => (
                                                <button
                                                    key={cat}
                                                    type="button"
                                                    onClick={() => setSelectedCategory(cat)}
                                                    className={`px-3 py-1.5 rounded-lg text-[10px] font-medium tracking-wide border shrink-0 transition-all ${selectedCategory === cat ? 'bg-white text-black border-white font-semibold' : 'bg-white/5 border-white/5 text-zinc-400 hover:text-white'}`}
                                                >
                                                    {cat}
                                                </button>
                                            ))}
                                        </div>

                                        <div className="flex-1 overflow-y-auto max-h-[35vh] pr-1 space-y-2 mt-2 hide-scrollbar">
                                            {filteredFoods.length === 0 ? (
                                                <div className="text-center py-10 border border-white/5 rounded-2xl bg-white/[0.01]">
                                                    <p className="text-xs text-zinc-500">No encontramos ningún alimento compatible.</p>
                                                </div>
                                            ) : (
                                                filteredFoods.map(food => (
                                                    <button
                                                        key={food.name}
                                                        type="button"
                                                        onClick={() => onSelectFood(food)}
                                                        className="w-full glass-card p-3.5 rounded-xl flex justify-between items-center text-left hover:border-white/10 active:scale-[0.99] transition-all"
                                                    >
                                                        <div>
                                                            <p className="text-xs font-semibold text-white line-clamp-1">{food.name}</p>
                                                            <p className="text-[10px] text-zinc-500 mt-0.5">{food.category}</p>
                                                        </div>
                                                        <div className="text-right shrink-0">
                                                            <p className="text-xs font-bold text-zinc-300">{food.calories} <span className="text-[9px] font-normal text-zinc-500">Kcal</span></p>
                                                            <p className="text-[9px] text-zinc-500 mt-0.5">{food.protein}g P / {food.measure === 'unit' ? 'Ud' : '100g'}</p>
                                                        </div>
                                                    </button>
                                                ))
                                            )}
                                        </div>
                                    </div>
                                ) : (
                                    // PANTALLA AJUSTAR ALIMENTO NATURAL
                                    <form onSubmit={handleNaturalSubmit} className="space-y-5 animate-fade-in flex-1 overflow-y-auto max-h-[60vh] hide-scrollbar">
                                        <div className="flex items-center gap-2 pb-2 border-b border-white/5">
                                            <button 
                                                type="button" 
                                                onClick={() => setSelectedNaturalFood(null)} 
                                                className="w-7 h-7 flex items-center justify-center rounded-full bg-white/5 text-zinc-400 hover:text-white transition-colors"
                                            >
                                                <Icon name="arrow-left" size={14} />
                                            </button>
                                            <span className="text-[10px] uppercase tracking-widest text-zinc-500 font-bold">Volver al buscador</span>
                                        </div>

                                        <div className="bg-white/[0.03] p-4 rounded-2xl border border-white/5">
                                            <h4 className="text-base font-semibold text-white mb-0.5 pr-5">{selectedNaturalFood.name}</h4>
                                            <p className="text-[10px] text-zinc-500">
                                                Valores base por {isUnit ? '1 Unidad' : '100g'}: {selectedNaturalFood.calories} Kcal • {selectedNaturalFood.protein}g P
                                            </p>
                                        </div>

                                        <div className="space-y-4">
                                            <div className="flex justify-between items-center">
                                                <label className="text-xs font-medium text-white">Cantidad consumida</label>
                                                <div className="w-20 premium-input bg-transparent rounded-xl flex items-center px-2 py-1">
                                                    <input 
                                                        required
                                                        type="number" 
                                                        value={naturalAmount} 
                                                        onChange={e => setNaturalAmount(Math.max(0, Number(e.target.value)))} 
                                                        className="w-full bg-transparent text-center font-semibold outline-none text-xs text-white" 
                                                    />
                                                    <span className="text-[10px] text-zinc-500">{measureLabel}</span>
                                                </div>
                                            </div>
                                            <input 
                                                type="range" 
                                                min="1" 
                                                max={isUnit ? 20 : 600} 
                                                step={isUnit ? 1 : 5} 
                                                value={naturalAmount} 
                                                onChange={e => setNaturalAmount(Number(e.target.value))} 
                                                className="w-full"
                                            />
                                        </div>

                                        <div className="p-4 rounded-2xl bg-black/40 border border-white/5 space-y-3">
                                            <p className="text-[9px] text-zinc-500 uppercase tracking-widest font-bold">Resumen aportado</p>
                                            <div className="grid grid-cols-4 gap-2 text-center">
                                                <div className="bg-white/5 p-2 rounded-xl border border-white/5">
                                                    <span className="text-[9px] text-zinc-500 uppercase block mb-0.5">Kcal</span>
                                                    <span className="text-xs font-semibold text-white">{Math.round(totalNatCals)}</span>
                                                </div>
                                                <div className="bg-white/5 p-2 rounded-xl border border-white/5">
                                                    <span className="text-[9px] text-zinc-500 uppercase block mb-0.5">Prot</span>
                                                    <span className={`text-xs font-semibold ${themeText}`}>{Math.round(totalNatProt)}g</span>
                                                </div>
                                                <div className="bg-white/5 p-2 rounded-xl border border-white/5">
                                                    <span className="text-[9px] text-zinc-500 uppercase block mb-0.5">Carb</span>
                                                    <span className="text-xs font-semibold text-zinc-300">{Math.round(totalNatCarbs)}g</span>
                                                </div>
                                                <div className="bg-white/5 p-2 rounded-xl border border-white/5">
                                                    <span className="text-[9px] text-zinc-500 uppercase block mb-0.5">Grasa</span>
                                                    <span className="text-xs font-semibold text-zinc-400">{Math.round(totalNatFat)}g</span>
                                                </div>
                                            </div>
                                        </div>

                                        <button type="submit" className="w-full text-black bg-white hover:bg-zinc-200 transition-colors font-medium text-xs tracking-wider p-4 rounded-2xl active:scale-[0.98]">
                                            CONFIRMAR
                                        </button>
                                    </form>
                                )}
                            </div>
                        ) : (
                            <form onSubmit={handleManualSubmit} className="space-y-4 animate-fade-in flex-1 overflow-y-auto max-h-[60vh] pr-1 hide-scrollbar">
                                <p className="text-[9px] text-zinc-400 mb-4 leading-relaxed bg-white/5 border border-white/5 p-3 rounded-xl">
                                    Introduce los valores <strong className="text-white">por 100g</strong> y los gramos consumidos. Si dejas los gramos en blanco, se registrarán los valores totales ingresados.
                                </p>

                                <div>
                                    <label className="text-[9px] text-zinc-500 uppercase tracking-widest font-medium ml-1">Nombre del alimento</label>
                                    <input required type="text" value={mName} onChange={e => setMName(e.target.value)} placeholder="Ej. Batido de Proteína" className="w-full premium-input bg-transparent rounded-2xl p-4 text-[13px] mt-1.5 text-white outline-none" />
                                </div>
                                
                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <label className="text-[9px] text-zinc-500 uppercase tracking-widest font-medium ml-1">Gramos (Opcional)</label>
                                        <input type="number" value={mAmount} onChange={e => setMAmount(e.target.value)} placeholder="Ej: 200" className="w-full premium-input bg-transparent rounded-2xl p-4 text-[13px] mt-1.5 text-white outline-none" />
                                    </div>
                                    <div>
                                        <label className="text-[9px] text-zinc-500 uppercase tracking-widest font-medium ml-1">Calorías (kcal)</label>
                                        <input required type="number" value={mCals} onChange={e => setMCals(e.target.value)} placeholder="Valor" className="w-full premium-input bg-transparent rounded-2xl p-4 text-[13px] mt-1.5 text-white outline-none" />
                                    </div>
                                </div>

                                <div className="grid grid-cols-3 gap-3">
                                    <div>
                                        <label className="text-[9px] text-zinc-500 uppercase tracking-widest font-medium ml-1">Proteínas (g)</label>
                                        <input type="number" value={mProt} onChange={e => setMProt(e.target.value)} placeholder="g" className="w-full premium-input bg-transparent rounded-2xl p-3 text-center text-[13px] mt-1.5 text-white outline-none" />
                                    </div>
                                    <div>
                                        <label className="text-[9px] text-zinc-500 uppercase tracking-widest font-medium ml-1">Carbos (g)</label>
                                        <input type="number" value={mCarbs} onChange={e => setMCarbs(e.target.value)} placeholder="g" className="w-full premium-input bg-transparent rounded-2xl p-3 text-center text-[13px] mt-1.5 text-white outline-none" />
                                    </div>
                                    <div>
                                        <label className="text-[9px] text-zinc-500 uppercase tracking-widest font-medium ml-1">Grasas (g)</label>
                                        <input type="number" value={mFat} onChange={e => setMFat(e.target.value)} placeholder="g" className="w-full premium-input bg-transparent rounded-2xl p-3 text-center text-[13px] mt-1.5 text-white outline-none" />
                                    </div>
                                </div>

                                <div className="p-4 rounded-2xl bg-white/5 border border-white/10 mt-2 flex justify-between items-center shrink-0">
                                    <div>
                                        <p className="text-[9px] text-zinc-500 uppercase tracking-widest mb-1">Total a añadir</p>
                                        <p className="text-lg font-medium text-white tracking-tight">{Math.round(totalCals)} <span className="text-xs font-light text-zinc-500">kcal</span></p>
                                    </div>
                                    <div className="text-right">
                                        <p className={`text-[13px] font-bold ${themeText}`}>+{Math.round(totalProt)}g P</p>
                                    </div>
                                </div>

                                <button type="submit" className="w-full mt-4 bg-white text-black font-medium text-[15px] tracking-wide p-4 rounded-2xl active:scale-[0.98] transition-transform">
                                    AÑADIR MANUALMENTE
                                </button>
                            </form>
                        )}
                    </div>
                </div>
            );
        }

        // MODAL DE AJUSTES (Con Edición de Perfil)
        function ModalAjustes({ profile, onClose, onEditProfile, onReset, apiKey, saveApiKey }) {
            const [showConfirm, setShowConfirm] = useState(false);
            const [localKey, setLocalKey] = useState(apiKey);
            
            const isBulk = profile.goal === 'bulk';

            if (showConfirm) {
                return (
                    <div className="fixed inset-0 bg-black/60 backdrop-blur-md z-50 flex items-center justify-center p-6 animate-fade-in">
                        <div className="glass-card rounded-[32px] w-full max-w-sm p-8 text-center relative">
                            <div className="w-16 h-16 bg-red-500/10 rounded-full flex items-center justify-center mx-auto mb-5 border border-red-500/20">
                                <Icon name="alert-triangle" size={32} className="text-red-500" />
                            </div>
                            <h3 className="text-xl font-medium mb-3 text-white tracking-tight">¿Estás seguro?</h3>
                            <p className="text-sm text-zinc-400 mb-8 font-light leading-relaxed">
                                Se borrará todo tu historial y configuración de IA.
                            </p>
                            <div className="flex flex-col gap-3">
                                <button onClick={() => { onReset(); onClose(); }} className="w-full bg-red-500/10 text-red-500 border border-red-500/20 font-medium p-4 rounded-2xl active:scale-[0.98] transition-transform">
                                    Sí, borrar todo
                                </button>
                                <button onClick={() => setShowConfirm(false)} className="w-full premium-input bg-transparent text-white font-medium p-4 rounded-2xl transition-colors hover:bg-white/5 outline-none">
                                    Cancelar
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="fixed inset-0 bg-black/60 backdrop-blur-md z-50 flex items-center justify-center p-6 animate-fade-in">
                    <div className="glass-card rounded-[32px] w-full max-w-sm p-6 relative flex flex-col">
                        <button onClick={onClose} className="absolute top-6 right-6 text-zinc-500 hover:text-white transition-colors">
                            <Icon name="x" size={22} />
                        </button>
                        <h3 className="text-xl font-medium mb-6 text-white tracking-tight ml-2">Ajustes</h3>
                        
                        <div className="bg-black/40 rounded-2xl p-5 mb-5 border border-white/5">
                            <div className="flex justify-between items-center mb-3">
                                <p className="text-xs text-zinc-500 uppercase tracking-widest font-medium">Perfil</p>
                                <span className="text-white font-medium">{profile.name || 'Usuario'}</span>
                            </div>
                            <div className="flex justify-between items-center mb-3">
                                <p className="text-xs text-zinc-500 uppercase tracking-widest font-medium">Meta Actual</p>
                                <span className={`text-[10px] uppercase font-bold tracking-widest px-2 py-0.5 rounded ${isBulk ? 'bg-indigo-500/20 text-indigo-400' : 'bg-teal-500/20 text-teal-400'}`}>
                                    {isBulk ? 'Volumen' : 'Definición'}
                                </span>
                            </div>
                            <div className="flex justify-between items-center mb-3">
                                <p className="text-xs text-zinc-500 uppercase tracking-widest font-medium">Peso Actual</p>
                                <span className="text-white font-medium">{profile.weight} kg</span>
                            </div>
                            <div className="flex justify-between items-center">
                                <p className="text-xs text-zinc-500 uppercase tracking-widest font-medium">Calorías Diarias</p>
                                <span className="text-white font-medium">{profile.cals} kcal</span>
                            </div>
                        </div>

                        <button onClick={() => { onClose(); onEditProfile(); }} className="w-full bg-white/5 border border-white/10 text-white font-medium text-sm p-4 rounded-2xl transition-colors hover:bg-white/10 outline-none mb-6">
                            Editar Perfil Metabólico
                        </button>

                        <div className="bg-black/40 rounded-2xl p-5 mb-8 border border-white/5 space-y-3">
                            <div className="flex justify-between items-center mb-1">
                                <label className="text-[10px] text-zinc-500 uppercase tracking-widest font-medium">API Key IA</label>
                                {!apiKey && <span className="text-[9px] font-bold text-red-400 bg-red-500/10 px-2 py-0.5 rounded uppercase tracking-wider">Requerida</span>}
                            </div>
                            <input 
                                type="password" 
                                value={localKey} 
                                onChange={(e) => {
                                    setLocalKey(e.target.value);
                                    saveApiKey(e.target.value);
                                }} 
                                placeholder="Pega tu API Key aquí..."
                                className="w-full premium-input bg-transparent rounded-xl p-3.5 text-sm text-white outline-none" 
                            />
                        </div>
                        
                        <button onClick={() => setShowConfirm(true)} className="w-full flex items-center justify-center gap-2 text-zinc-500 hover:text-red-400 font-medium text-sm p-4 rounded-2xl active:scale-[0.98] transition-colors">
                            Cerrar sesión / Borrar cuenta
                        </button>

                        <div className="mt-8 mb-2 flex justify-center items-center gap-2 opacity-50 hover:opacity-100 transition-opacity">
                            <div className="h-px bg-zinc-800 flex-1"></div>
                            <p className="text-[9px] text-zinc-400 font-medium tracking-[0.2em] uppercase">
	                                Creado por Marcos Zabala Duro
                            </p>
                            <div className="h-px bg-zinc-800 flex-1"></div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
